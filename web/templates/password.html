{{define "title"}}{{ T .Lang "page.password.title" }}{{end}}
{{define "content"}}
<h1>{{ T .Lang "page.password.heading" }}</h1>
{{if .Error}}<p class="error">{{.Error}}</p>{{end}}
<form method="post" action="/{{.ID}}">
  <label for="password">{{ T .Lang "form.password.label" }}</label>
  <input type="password" id="password" name="password" required autofocus>
  <p><button type="submit">{{ T .Lang "button.unlock" }}</button></p>
</form>
{{end}}
